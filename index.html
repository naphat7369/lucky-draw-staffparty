    * { box-sizing: border-box; }

    body {
      margin: 0; padding: 0;

      font-family: 'Kanit', sans-serif;
      text-align: center;
      color: #5c4b37;
      position: relative;
      overflow-x: hidden;
      /* พื้นหลังรูปภาพวิวไทยตามต้นแบบ */

      background-size: cover;
      background-position: center;
    }

    .main-content {
      flex: 1;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 15px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      max-width: 800px;
      width: 95%;
      min-height: 90vh;
      max-height: 98vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin: auto;
      gap: 5px;
      overflow-y: auto;
    }

    .sidebar {
      width: 260px;
      height: 96vh;
      background: rgba(255, 255, 255, 0.8);

      margin: 10px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      box-shadow: -5px 0 15px rgba(0,0,0,0.05);
    }

    .sidebar h2 { font-size: 16px; margin: 0 0 10px; border-bottom: 2px solid #b08d57; padding-bottom: 5px; color: #b08d57; display: flex; align-items: center; justify-content: center; gap: 5px; }
    #winnerList {
      flex: 1;
      overflow-y: auto;
      text-align: left;
    }

    .winner-item {
      background: #fff;
      padding: 8px; margin-bottom: 8px;
      border-radius: 10px; border-left: 4px solid #b08d57;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .winner-item.jackpot { border-left-color: #8c6d41; background: #fdfaf5; }
    .winner-item .w-name { font-size: 14px; font-weight: 700; color: #5c4b37; }
    .winner-item .w-info { font-size: 11px; color: #b08d57; }

    @keyframes slideIn {
      from { transform: translateX(50px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 1100px) {
      body { flex-direction: column; }
      .sidebar { width: 95%; height: 300px; margin: 20px 0; border-left: none; border-top: 2px solid #b08d57; }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ลายไทยพื้นหลังจางๆ */
    body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle, transparent 30%, rgba(176, 141, 87, 0.05) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ลายพื้นหลังแบบเรียบหรู */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;

      pointer-events: none;
      z-index: 0;
    }

      flex-wrap: wrap;
      margin-bottom: 5px;

    }
